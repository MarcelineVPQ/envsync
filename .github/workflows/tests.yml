name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run tests
        run: python -m pytest -q

      - name: Smoke-test the CLI
        run: |
          printf 'FOO=bar\nNEW=1\n' > tmpl.env
          printf 'FOO=custom\n' > real.env
          # drift present -> exit 1
          if python envsync.py tmpl.env real.env; then
            echo "expected drift (exit 1) but got exit 0" && exit 1
          fi
          # apply, then it should be in sync (exit 0)
          python envsync.py tmpl.env real.env --apply
          python envsync.py tmpl.env real.env
          grep -q '^FOO=custom$' real.env   # existing value preserved
